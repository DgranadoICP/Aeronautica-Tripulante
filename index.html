const EXPLANATIONS = {"1": "La aerodinámica es la rama de la física que estudia el comportamiento de los cuerpos inmersos en una corriente de aire y las fuerzas que se generan sobre sus superficies.", "2": "Un perfil aerodinámico es toda forma diseñada para producir sustentación u otro efecto aerodinámico útil al desplazarse a través del aire, no se limita a producir solo resistencia ni a reducir peso.", "3": "Las partes básicas del perfil son: borde de ataque (frente), borde de salida (atrás), intradós (cara inferior), extradós (cara superior) y cuerda (línea recta entre bordes). Alerones, flaps y slats son superficies de control, no partes del perfil.", "4": "El borde de ataque es la curvatura delantera del perfil donde impacta primero el viento relativo. El borde de fuga es la parte posterior.", "5": "La sustentación se genera por la diferencia de presión entre intradós (mayor presión) y extradós (menor presión), según el principio de Bernoulli.", "6": "El ángulo de ataque es el ángulo entre la cuerda del perfil y la dirección del viento relativo. No confundir con el ángulo de incidencia (fijo, entre eje longitudinal y cuerda del ala).", "7": "La tracción o empuje, generada por los motores, es la fuerza que se opone directamente a la resistencia aerodinámica, permitiendo el avance de la aeronave.", "8": "CIERTO. Alerones, timón de profundidad y timón de dirección son superficies de control que complementan el perfil aerodinámico, permitiendo controlar la actitud del avión en los tres ejes.", "9": "El alabeo (roll) es el movimiento sobre el eje longitudinal, controlado por los alerones. El cabeceo es sobre el eje lateral y la guiñada sobre el eje vertical.", "10": "Los elevadores (timón de profundidad) controlan el cabeceo, que varía el ángulo de ataque. Los alerones controlan el alabeo y el timón direccional la guiñada.", "11": "El timón direccional (rudder) produce la guiñada, que es el movimiento de rotación sobre el eje vertical del avión.", "12": "El borde de ataque es la parte delantera del perfil que enfrenta al viento relativo. Es el primer punto de contacto con la corriente de aire.", "13": "FALSO. La parte inferior del ala es el intradós, no el extradós. El extradós es la superficie superior del perfil aerodinámico donde el aire circula más rápido.", "14": "La envergadura es la distancia medida entre los dos extremos de las alas (de punta a punta). No confundir con alargamiento, superficie alar o flecha.", "15": "Un ala de mayor superficie produce tanto mayor sustentación como mayor resistencia (A y B correctas), ya que ambas fuerzas son proporcionales al área de la superficie alar.", "16": "El ángulo diedro es el formado por las alas vistas de frente respecto a la horizontal. Proporciona estabilidad lateral al avión.", "17": "Los flaps son dispositivos hipersustentadores ubicados en el borde de fuga que aumentan la sustentación a baja velocidad, esenciales para despegues y aterrizajes.", "18": "Extender los flaps aumenta la curvatura y superficie del ala, incrementando la sustentación sin necesidad de cambiar el ángulo de ataque.", "19": "Un ángulo de ataque excesivo supera el ángulo crítico, causando separación del flujo de aire del extradós y pérdida abrupta de sustentación (stall).", "20": "El teorema de Bernoulli establece que al aumentar la velocidad de un fluido, su presión estática disminuye. Esto explica la sustentación: el aire va más rápido por el extradós, creando menor presión arriba.", "21": "La sustentación es la fuerza perpendicular al viento relativo, generada por la diferencia de presión entre las superficies del perfil aerodinámico.", "22": "El ángulo de incidencia es el ángulo fijo (de diseño) entre el eje longitudinal del avión y la cuerda media del ala. A diferencia del ángulo de ataque, no varía durante el vuelo.", "23": "El viento relativo es la corriente de aire que enfrenta al perfil en dirección opuesta a su trayectoria. Es relativo porque depende del movimiento de la aeronave.", "24": "El ángulo de ataque se forma entre la cuerda media del ala y la dirección del viento relativo. Es variable y lo controla el piloto con los elevadores.", "25": "Al aumentar el ángulo de ataque, se incrementa la sustentación pero también la resistencia inducida, lo que reduce la velocidad. Esto ocurre hasta alcanzar el ángulo crítico.", "26": "La resistencia inducida es un subproducto de la sustentación. Al aumentar el ángulo de ataque se genera más sustentación y, proporcionalmente, más resistencia inducida.", "27": "El centro de presión es el punto del ala donde se concentra la resultante de todas las fuerzas aerodinámicas de sustentación. No confundir con el centro de gravedad.", "28": "El peso (fuerza gravitacional) actúa verticalmente hacia abajo y se opone directamente a la sustentación, que actúa hacia arriba.", "29": "La resistencia aerodinámica es proporcional al cuadrado de la velocidad: al duplicar la velocidad, la resistencia se cuadruplica.", "30": "Al girar el mando a la derecha: el alerón derecho sube (reduce sustentación en ala derecha) y el izquierdo baja (aumenta sustentación en ala izquierda), provocando alabeo a la derecha.", "31": "En vuelo recto y nivelado, las cuatro fuerzas (sustentación, peso, tracción y resistencia) se encuentran en equilibrio: sustentación=peso y tracción=resistencia.", "32": "La aerodinámica es la ciencia que estudia las leyes del movimiento del aire y las fuerzas que se producen sobre los cuerpos que se desplazan a través de él.", "33": "Las cuatro fuerzas en vuelo nivelado son: sustentación (arriba), peso (abajo), tracción (adelante) y resistencia (atrás). La fuerza centrífuga solo aparece en virajes.", "34": "Los alerones son superficies de control primarias en el borde de fuga de las alas que proporcionan control lateral (alabeo) alrededor del eje longitudinal.", "35": "Los controles de vuelo primarios son: timón de profundidad (cabeceo), timón de dirección (guiñada) y alerones (alabeo). Los flaps, slats y spoilers son secundarios.", "36": "Los flaps aumentan la superficie alar y permiten operar a bajas velocidades en despegues y aterrizajes (A y C correctas). No están diseñados para aumentar la rata de ascenso.", "37": "El timón de dirección (rudder) está en el estabilizador vertical y actúa sobre el eje vertical, produciendo el movimiento de guiñada (yaw).", "38": "El timón de profundidad (elevadores) está en el estabilizador horizontal y actúa sobre el eje transversal o lateral, produciendo el movimiento de cabeceo (pitch).", "39": "Los alerones están en las alas y actúan sobre el eje longitudinal, produciendo el movimiento de alabeo (roll).", "40": "FALSO. La sustentación es la fuerza hacia ARRIBA generada por el perfil aerodinámico, no hacia abajo. Se opone al peso.", "41": "Los perfiles aerodinámicos del avión incluyen las alas, la hélice (que también es un perfil aerodinámico giratorio) y el empenaje (estabilizadores de cola).", "42": "Los tres ejes de rotación son: vertical (guiñada), lateral/transversal (cabeceo) y longitudinal (alabeo). Cada uno tiene su superficie de control correspondiente.", "43": "El stall se produce por una pérdida abrupta de sustentación al exceder el ángulo de ataque crítico. No es simplemente pérdida de velocidad, sino una ruptura del flujo aerodinámico.", "44": "VERDADERO. Los alerones producen el movimiento de alabeo (roll) alrededor del eje longitudinal del avión.", "45": "Un perfil aerodinámico es cualquier superficie (como un ala) diseñada para obtener reacciones aerodinámicas útiles como la sustentación al desplazarse por el aire.", "46": "Los spoilers son dispositivos que se despliegan sobre el extradós del ala para destruir la sustentación durante el aterrizaje, aumentando el peso efectivo sobre las ruedas.", "47": "Una hélice en movimiento es un perfil aerodinámico rotativo que genera empuje o tracción, la fuerza que impulsa la aeronave hacia adelante.", "48": "Las alas son la estructura principal responsable de generar sustentación mediante la diferencia de presión entre extradós e intradós.", "49": "CIERTO. A mayor altitud, la densidad del aire disminuye, lo que afecta la sustentación, la potencia de los motores y el rendimiento general de la aeronave.", "50": "La sustentación se basa en el diferencial de presión entre las superficies del ala (intradós y extradós), explicado por el principio de Bernoulli.", "51": "FALSO. El principio de sustentación es el mismo para helicópteros y aviones: diferencia de presión en perfiles aerodinámicos. La diferencia es que el helicóptero usa palas rotativas.", "52": "El aire se desplaza más rápido por la parte superior (extradós) debido a la curvatura del perfil, creando menor presión arriba y generando sustentación (principio de Bernoulli).", "53": "El empenaje es la sección de cola que incluye perfiles fijos (estabilizadores horizontal y vertical) y sus superficies de control móviles (elevadores y timón de dirección).", "54": "CIERTO. El ángulo de ataque es variable y el piloto puede modificarlo usando los elevadores (timón de profundidad) para cambiar la actitud del avión.", "55": "La velocidad se define como la distancia recorrida en una unidad de tiempo. Es una magnitud fundamental en aerodinámica que afecta la sustentación y la resistencia.", "56": "El timón de dirección mueve al avión sobre el eje vertical, produciendo el movimiento de guiñada que cambia la orientación lateral de la aeronave.", "57": "El timón de profundidad (elevadores) es la superficie de control primaria que permite aumentar o disminuir el ángulo de ataque, controlando el cabeceo del avión.", "58": "Las fuerzas de sustentación (arriba) y peso (abajo) actúan en el plano vertical, perpendiculares a la superficie terrestre en vuelo nivelado.", "59": "Las fuerzas de empuje (adelante) y resistencia (atrás) actúan a lo largo del eje longitudinal del avión, paralelas a la dirección de vuelo.", "60": "CIERTO. La sustentación y el empuje son fuerzas favorables y positivas: la sustentación mantiene al avión en el aire y el empuje lo mantiene en movimiento.", "61": "El centro de presión es el punto de la cuerda aerodinámica donde se concentra la resultante de todas las fuerzas aerodinámicas. Su posición varía con el ángulo de ataque.", "62": "El estabilizador fijo vertical (aleta dorsal) proporciona estabilidad direccional, evitando que el avión gire involuntariamente sobre su eje vertical.", "63": "El hielo que se forma sobre las superficies altera el perfil aerodinámico, aumentando la resistencia y disminuyendo la sustentación. La lluvia, niebla y apagar motores no alteran el perfil igual.", "64": "Las superficies de control primarias son: timón de dirección (rudder), elevadores y alerones. Son las que permiten controlar la actitud del avión en sus tres ejes.", "65": "Las superficies de control secundarias son: flaps, slats y spoilers. Modifican las características aerodinámicas del ala pero no controlan directamente la actitud del avión.", "66": "La altitud reduce la densidad del aire, afectando adversamente la sustentación y la potencia de los motores. El frío, calor y latitud tienen menor impacto.", "67": "Los elevadores (timones de profundidad) se ubican en la superficie fija horizontal de cola (estabilizador horizontal), no en las alas.", "68": "CIERTO. El extradós es la superficie superior del perfil aerodinámico (ala), donde el aire fluye a mayor velocidad y genera menor presión.", "69": "Los dispositivos hipersustentadores (flaps, slats) permiten al piloto volar a menor velocidad manteniendo suficiente sustentación, esencial para aterrizajes y despegues.", "70": "El intradós es la cara inferior del perfil aerodinámico donde se genera mayor presión estática que en el extradós, contribuyendo a la sustentación.", "71": "Los estabilizadores del empenaje funcionan bajo los mismos principios aerodinámicos que las alas y la hélice: son perfiles que interactúan con el flujo de aire.", "72": "CIERTO. Los elevadores y compensadores (trim tabs) se complementan: los elevadores controlan el cabeceo y los compensadores reducen la fuerza necesaria para mantener una posición.", "73": "Las superficies primarias se denominan así porque son las superficies de control del avión (alerones, elevadores, timón), no por ser principales o aerodinámicas.", "74": "Al presionar el pedal izquierdo, el timón de dirección se mueve a la izquierda y la nariz del avión gira hacia la izquierda (guiñada a la izquierda).", "75": "Al presionar el pedal derecho, la cola se mueve a la izquierda y la nariz a la derecha. El timón actúa como una superficie aerodinámica que desvía el flujo de aire.", "76": "Daniel Bernoulli formuló el principio que explica la sustentación aerodinámica: al aumentar la velocidad del aire sobre el extradós, la presión disminuye, generando sustentación.", "77": "Al inclinar la columna hacia atrás, los elevadores suben, la cola baja y la nariz sube. Esto aumenta el ángulo de ataque.", "78": "Durante la demostración de seguridad en vivo, las luces deben estar en BRIGHT (máxima intensidad) para que los pasajeros puedan ver claramente las instrucciones.", "79": "Ante un objeto sospechoso: se avisa al capitán, se aísla el sector y se siguen los procedimientos de seguridad establecidos. Nunca se debe manipular ni mover el objeto.", "80": "El fuego requiere tres elementos (triángulo del fuego): material combustible, oxígeno y calor. Eliminar cualquiera de estos extingue el fuego.", "81": "El PBE (Protective Breathing Equipment) es un equipo de protección respiratoria contra humo y gases tóxicos, usado por la tripulación durante emergencias con humo en cabina.", "82": "El extintor de agua solo es efectivo para incendios tipo A (sólidos orgánicos como madera, papel, tela). No debe usarse en incendios eléctricos ni de líquidos inflamables.", "83": "Los despegues y aterrizajes son fases críticas porque la aeronave está cerca del suelo, a velocidades bajas, con configuración cambiante y menor margen de error.", "84": "El concepto Cabina Lista busca asegurar razonablemente que la cabina esté preparada para enfrentar cualquier emergencia que pueda surgir durante las fases críticas del vuelo.", "85": "Clasificación de incendios: A-sólidos orgánicos inflamables, B-líquidos inflamables, C-eléctricos, D-metales combustibles. Cada tipo requiere un agente extintor específico.", "86": "Se verifica ubicación, cantidad, vigencia y fácil acceso del equipo de emergencia. Todos estos aspectos son esenciales para garantizar su disponibilidad en una emergencia.", "87": "Antes de sacar un bote salvavidas, debe amarrarse a la cuerda de anclaje de la aeronave para evitar que sea arrastrado por el viento o las corrientes antes de que todos aborden.", "88": "La demostración incluye: cinturón de seguridad, chaleco salvavidas, máscara de oxígeno, salidas de emergencia y restricción de fumar. Son los elementos básicos de seguridad.", "89": "El extintor de halón (Halon 1211) es efectivo para incendios eléctricos (tipo C) y también para líquidos inflamables (tipo B), por eso es el más común en aviación.", "90": "VERDADERO. El agua de mar potabilizada (desalinizada) puede beberse sin efectos adversos. Sin embargo, beber agua de mar sin potabilizar causa deshidratación.", "91": "Las bengalas son elementos pirotécnicos de localización que producen señales luminosas y de humo, visibles a gran distancia, para facilitar el rescate.", "92": "La primera acción al llegar al avión es verificar los equipos de emergencia y asegurarse de que no haya elementos sospechosos, antes de preparar el servicio de pasajeros.", "93": "Las tarjetas de inspección de botes salvavidas y toboganes tienen vigencia de 1 año, tras el cual deben ser reinspeccionados y recertificados.", "94": "Supervivencia es permanecer vivo hasta ser rescatado. Implica protegerse, señalizar la posición, mantener la disciplina y racionar recursos.", "95": "Todas las señales mencionadas sirven para ser localizados: bengalas, fogatas en triángulo y humo de ramas verdes. Usar múltiples métodos aumenta las probabilidades de rescate.", "96": "En un amarizaje, los sobrevivientes deben permanecer juntos para facilitar la localización por equipos de rescate y compartir recursos de supervivencia.", "97": "Entre los trópicos para orientarse: mano derecha apuntando al sol naciente (este), el sur queda a la izquierda, el norte detrás.", "98": "La posición de impacto protege la cerviz y la columna vertebral de las fuerzas de desaceleración durante un aterrizaje forzoso, reduciendo lesiones graves.", "99": "Los incendios de metales (clase D) son sumamente peligrosos porque arden a temperaturas extremadamente altas y reaccionan violentamente con agua y otros agentes extintores comunes.", "100": "Las cuerdas de escape son parte integral de cada ventanilla de emergencia, almacenadas junto a ellas para facilitar la evacuación rápida si es necesario.", "101": "Para producir humo blanco visible en selva, se queman ramas verdes que generan vapor de agua denso. El aceite produce humo negro y otros materiales no son tan efectivos.", "102": "FALSO. El agua de mar y la orina no suplen la falta de agua potable. Ambas aceleran la deshidratación por su alto contenido de sales.", "103": "Los cuatro principios básicos de supervivencia son: Protección (refugio), Localización (señales), Disciplina (organización del grupo) y Alimentación (agua y comida).", "104": "CIERTO. Permanecer cerca de la aeronave facilita la localización porque los equipos de rescate buscan primero en la zona del accidente y el avión es más visible.", "105": "El procedimiento de Cabina Estéril exige que durante fases críticas, la tripulación mantenga conciencia situacional y se limite a funciones esenciales de seguridad.", "106": "Durante fases críticas, los tripulantes solo abandonan sus puestos para realizar tareas relacionadas con la seguridad del vuelo, no para servicio de pasajeros.", "107": "Las empresas deben demostrar evacuación completa en 90 segundos o menos, incluyendo apertura de salidas de emergencia, como establece la regulación aeronáutica.", "108": "El movimiento autocinético nocturno es la ilusión visual de que una luz estática se mueve cuando se observa fijamente sobre fondo oscuro por tiempo prolongado.", "109": "El Black Out se produce por pérdida temporal de la visión debido a fuerzas G positivas en maniobras que reducen el flujo sanguíneo al cerebro y los ojos.", "110": "CIERTO. El CO₂ (dióxido de carbono) regula la respiración: cuando aumenta en sangre, estimula el centro respiratorio para aumentar la frecuencia respiratoria.", "111": "FALSO. La buena salud resulta del buen funcionamiento de factores biológicos, psicológicos Y sociales, no solo del factor biológico.", "112": "CIERTO. La baro-otitis ocurre cuando las presiones no se igualan en el oído medio durante cambios de altitud, causando dolor y posible daño al tímpano.", "113": "CIERTO. En vuelo nocturno, los pilotos usan la visión periférica (bastones retinianos) que es más sensible a la luz tenue que la visión central (conos).", "114": "CIERTO. La trompa de Eustaquio conecta el oído medio con la faringe y permite igualar las presiones, especialmente importante durante el descenso.", "115": "FALSO. El equilibrio del piloto está relacionado con el sistema vestibular (oído interno), el sistema visual y el sistema propioceptivo, no con el ruido ambiental.", "116": "La visión nocturna es de tipo periférica porque los bastones (células sensibles a la luz tenue) se concentran en la periferia de la retina, no en el centro.", "117": "Los canales semicirculares son órganos del oído interno que detectan la aceleración angular y proporcionan información al cerebro sobre el sentido de giro del cuerpo.", "118": "El estrés en aviación está asociado con trabajo, problemas físicos y problemas personales. La velocidad y altura por sí solas no generan estrés significativo.", "119": "El disbarismo es causado por cambios bruscos de presión que afectan los gases en el cuerpo: gases atrapados en cavidades y gases disueltos en la sangre.", "120": "A partir de 10,000 pies de altitud, la presión parcial de oxígeno disminuye significativamente y el piloto requiere oxígeno suplementario en vuelo diurno.", "121": "Tras buceo autónomo, se debe esperar 24 horas antes de volar para permitir la eliminación del nitrógeno disuelto y evitar enfermedad descompresiva.", "122": "Hipoxia (deficiencia parcial de oxígeno) y anoxia (ausencia total de oxígeno) son términos diferentes. La anoxia es más grave y puede causar la muerte rápidamente.", "123": "La buena salud depende de todos los factores: biológico (genética, fisiología), psicológico (salud mental) y social (relaciones, entorno). Son interdependientes.", "124": "El tabaquismo es un factor acelerador de la hipoxia porque el monóxido de carbono del humo se une a la hemoglobina, desplazando al oxígeno.", "125": "CIERTO. Las ilusiones sensoriales (visuales, vestibulares, propioceptivas) pueden provocar desorientación espacial cuando el cerebro interpreta incorrectamente las señales.", "126": "El sistema visual es el más importante para mantener el equilibrio y la orientación espacial, proporcionando hasta el 80% de la información de orientación.", "127": "FALSO. La confiabilidad del sistema visual se reduce significativamente por encima de los 5,000 pies (no 20,000), especialmente sin oxígeno suplementario.", "128": "FALSO. Los pilotos de aviones jet (alta velocidad, grandes altitudes) están más expuestos a desorientación espacial que los de aviones a hélice.", "129": "CIERTO. Los Bends son burbujas de nitrógeno que se forman en las articulaciones durante una descompresión rápida, causando dolor intenso.", "130": "CIERTO. La reducción de posibilidades de hipoxia y efectos de gases en solución se logra mediante cabinas presurizadas que mantienen una altitud de cabina segura.", "131": "La Ley de Dalton establece que la presión total es la suma de las presiones parciales de cada gas. Esto explica cómo la homeostasis depende del equilibrio de presiones parciales.", "132": "CIERTO. El ruido se caracteriza por su intensidad (volumen, medido en decibelios) y frecuencia (tono, medido en hercios).", "133": "A mayor altura, la presión parcial de oxígeno disminuye, lo que potencia el efecto del monóxido de carbono sobre la hemoglobina, aumentando el riesgo de hipoxia.", "134": "El alcohol afecta el juicio y la capacidad de tomar decisiones incluso en pequeñas cantidades. La altitud potencia estos efectos, no los disminuye.", "135": "La hiperventilación se manifiesta con aumento de la rata de respiración. Otros síntomas incluyen hormigueo, mareos y sensación de falta de aire.", "136": "Para contrarrestar la hiperventilación, se debe disminuir la rata (frecuencia) respiratoria conscientemente, respirando más lento y profundo.", "137": "La hiperventilación resulta en insuficiencia de dióxido de carbono (CO₂) en sangre, ya que la respiración excesiva elimina demasiado CO₂, causando alcalosis respiratoria.", "138": "Ante desorientación espacial, el piloto debe confiar en los instrumentos de vuelo, ya que las sensaciones corporales son poco fiables y pueden dar información falsa.", "139": "La barosinusitis causa dolor en la cara (senos paranasales) debido a la diferencia de presión entre los senos y el exterior cuando los conductos están obstruidos.", "140": "CIERTO. El tiempo de conciencia útil (TCU) es el período máximo para actuar coherentemente tras perder suministro de oxígeno, antes de la incapacitación.", "141": "La visión, los órganos propioceptivos y el sentido del equilibrio (sistema vestibular) son las tres fuentes de información que el cerebro usa para la orientación espacial.", "142": "La hipoxia es la pérdida PARCIAL de oxígeno en la sangre. La anoxia es la ausencia total. La visión de túnel es un síntoma de hipoxia, no su definición.", "143": "Según la RAV 91.11, se requieren mínimo 8 horas entre el consumo de alcohol y actuar como tripulante. Esta norma protege contra los efectos residuales del alcohol.", "144": "El disbarismo se refiere a los cambios producidos por variaciones de presión barométrica en los gases del cuerpo, tanto atrapados como disueltos.", "145": "La asfixia es el paso inadecuado de aire a los pulmones, impidiendo la respiración normal. Puede ser por obstrucción, sofocación o inmersión.", "146": "Las causas de asfixia incluyen: sofocación, inmersión, ahogamiento, obstrucción mecánica y narcosis. Son todas formas que impiden la entrada de aire a los pulmones.", "147": "Después de 4 minutos sin oxígeno, las células cerebrales comienzan a sufrir daños irreversibles. Por eso la reanimación debe iniciarse inmediatamente.", "148": "Los síntomas de shock incluyen: mareos, palidez, frialdad de la piel, debilidad y pulso acelerado. Es la respuesta del cuerpo a una perfusión insuficiente.", "149": "El paro cardíaco es la desaparición del latido del corazón (cese de actividad mecánica). Requiere reanimación cardiopulmonar inmediata.", "150": "Una fractura es la pérdida de continuidad del hueso (se rompe). La dislocación es el desplazamiento articular y el esguince es una lesión de ligamentos.", "151": "En caso de fractura, el objetivo principal es mantener inmóviles los huesos rotos para evitar daño adicional a tejidos, vasos sanguíneos y nervios circundantes.", "152": "El intercambio gaseoso pulmonar consiste en que el CO₂ pasa de la sangre al alvéolo y el O₂ pasa del alvéolo a la sangre. Es un proceso bidireccional.", "153": "El estrés y la ansiedad pueden desencadenar hiperventilación al provocar un aumento involuntario de la frecuencia y profundidad de la respiración.", "154": "Los síntomas comunes de hiperventilación incluyen cosquilleo o picazón en manos, piernas y extremidades, más sensación de mareo, por la alcalosis respiratoria.", "155": "El monóxido de carbono causa somnolencia porque desplaza al oxígeno de la hemoglobina, reduciendo el suministro de O₂ al cerebro.", "156": "La bruma o calima reduce la visibilidad y crea la ilusión de estar más lejos de la pista, lo que puede llevar al piloto a volar una aproximación demasiado baja.", "157": "En vuelo nocturno, se debe recorrer la vista lentamente para usar la visión periférica (bastones), que es más sensible en condiciones de poca luz que la visión central.", "158": "Una aeronave sin movimiento aparente (tamaño constante en el campo visual) está en curso de colisión directa, representando el mayor peligro.", "159": "Usar sensaciones corporales para determinar la actitud del avión en lugar de los instrumentos es la causa más común de desorientación espacial.", "160": "Se recomienda apoyarse totalmente en los instrumentos para evitar la desorientación espacial, ya que las sensaciones corporales son poco confiables en vuelo.", "161": "La autokinesis es la ilusión de que una luz estacionaria se mueve cuando se mira fijamente en oscuridad. Es un fenómeno visual conocido en vuelo nocturno.", "162": "Si la pista se ve muy corta en aproximación visual, indica que la altura podría ser mayor de lo aparente. Una pista larga indica altura menor de la real.", "163": "Al penetrar niebla repentinamente, la pérdida de referencias visuales puede crear la ilusión de que la nariz del avión baja, llevando al piloto a corregir incorrectamente.", "164": "Según la RAV-91, sección 91.11, no se puede actuar como tripulante dentro de las 8 horas siguientes al consumo de bebidas alcohólicas.", "165": "Factores Humanos de Vuelo estudia las funciones orgánicas del cuerpo humano en relación con el ambiente de vuelo y sus efectos en el rendimiento.", "166": "El nitrógeno (N₂) constituye aproximadamente el 78% del aire que respiramos, siendo el gas más abundante. El oxígeno representa el 21%.", "167": "Para prevenir la hipoxia, no se debe volar despresurizado por encima de 10,000 pies sin oxígeno suplementario, ya que la presión parcial de O₂ es insuficiente.", "168": "El aeroembolismo se produce por la liberación del nitrógeno disuelto en los tejidos y sangre cuando la presión atmosférica disminuye rápidamente.", "169": "Ante hipoxia: descender a altitud más baja (mayor presión parcial de O₂), respirar oxígeno suplementario y reducir la actividad física.", "170": "La otitis barotraumática se produce por la obstrucción de la trompa de Eustaquio Y la deformación del tímpano por diferencial de presión (A y B correctas).", "171": "FALSO. Los canales semicirculares dan información confiable solo durante cambios de aceleración angular. En vuelo recto y nivelado prolongado, pueden dar señales erróneas.", "172": "FALSO. El TCU varía entre personas según edad, condición física, altitud, actividad y otros factores. No es igual para todos.", "173": "FALSO (la afirmación es incorrecta). En desorientación espacial se debe confiar en los instrumentos, NO en los sentidos, que pueden engañar.", "174": "CIERTO. El estrés es una respuesta natural del organismo ante estímulos externos (presiones, demandas). Puede ser positivo (eustrés) o negativo (distrés).", "175": "FALSO. La automedicación está prohibida para tripulantes, incluso con resfriados simples. Muchos medicamentos tienen efectos secundarios que afectan el rendimiento en vuelo.", "176": "FALSO. La zona fisiológica se extiende desde el nivel del mar hasta los 10,000 pies (no 15,000). Más allá, se requiere oxígeno suplementario.", "177": "CIERTO. El control químico de la respiración se basa en la sensibilidad del centro respiratorio a la presión parcial de CO₂ en sangre arterial.", "178": "La hiperactividad NO es característica del shock. El shock se manifiesta con mareos, náuseas, sudor excesivo y pulso irregular, que indican hipoperfusión.", "179": "FALSO. La hipoxia es deficiencia de oxígeno en los TEJIDOS, no solo en la sangre. La definición correcta incluye la insuficiencia a nivel celular.", "180": "La fase compensatoria de hipoxia ocurre entre 6,000 y 12,000 pies, donde la saturación de hemoglobina baja al 85%, causando taquicardia como mecanismo compensatorio.", "181": "CIERTO. La hipoxia histotóxica es un tipo de hipoxia donde las células no pueden usar el oxígeno disponible, generalmente por envenenamiento (alcohol, drogas, CO).", "182": "CIERTO. Los gases del disbarismo se clasifican en atrapados (en cavidades corporales) y envolventes (disueltos en tejidos y sangre).", "183": "CIERTO. Los glóbulos rojos (eritrocitos) contienen hemoglobina, la proteína que transporta oxígeno desde los pulmones a todos los tejidos del cuerpo.", "184": "CIERTO. Interpretar incorrectamente el horizonte (luces de una ciudad, costa inclinada) puede llevar a alinear el avión con una referencia falsa, causando desorientación.", "185": "CIERTO. Los Bends son burbujas de nitrógeno que se forman en las articulaciones durante la descompresión, causando dolor articular intenso.", "186": "FALSO. La parestesia son burbujas de nitrógeno en los nervios (causando hormigueo), no en los vasos pulmonares. Los Chokes afectan los vasos pulmonares.", "187": "CIERTO. El sistema respiratorio realiza el intercambio gaseoso: incorpora oxígeno del aire y elimina dióxido de carbono del organismo.", "188": "CIERTO. La hipoxia estagnante es la deficiencia de O₂ causada por problemas circulatorios que impiden el transporte adecuado de oxígeno a los tejidos.", "189": "CIERTO. Los Chokes son acumulaciones de burbujas de nitrógeno que bloquean los vasos pulmonares más pequeños, dificultando el intercambio gaseoso.", "190": "CIERTO. La Ley de Henry establece que la cantidad de gas disuelto en un líquido es proporcional a la presión parcial del gas sobre el líquido.", "191": "La hipoxia histotóxica es la deficiencia de O₂ por envenenamiento celular (alcohol, drogas, cianuro), donde las células no pueden utilizar el oxígeno disponible.", "192": "La hipoxia hipóxica se produce cuando la saturación de oxígeno es insuficiente por baja presión parcial de O₂ en el aire inspirado (altitud elevada).", "193": "La barodontalgia es el dolor dental causado por la presión diferencial en cavidades huecas de los dientes (empastes defectuosos, caries) durante cambios de altitud.", "194": "CIERTO. La aerocolgia es la expansión de gases atrapados en los intestinos debido a la disminución de la presión atmosférica con la altitud.", "195": "La fase compensatoria de hipoxia (6,000-12,000 pies) causa taquicardia y aumento de la respiración como mecanismos compensatorios ante la saturación de hemoglobina al 85%.", "196": "El disbarismo NO es un tipo de hipoxia. Los tipos de hipoxia son: hipóxica, anémica (hipémica), estagnante e histotóxica.", "197": "CIERTO. El metabolismo es el conjunto de reacciones químicas y biológicas continuas en las células que mantienen las funciones vitales del organismo.", "198": "CIERTO. El sistema circulatorio transporta y distribuye la sangre con oxígeno y nutrientes a todos los tejidos y recoge los productos de desecho.", "199": "El transporte aéreo regular se define como vuelos entre dos o más puntos en una ruta fija y horarios establecidos, con itinerarios publicados.", "200": "Toda aeronave civil venezolana debe inscribirse en el Registro Aeronáutico Nacional, que es el organismo oficial que lleva el control de las aeronaves del país.", "201": "El artículo 73 de la Ley de Aeronáutica Civil prohíbe el porte de armas a bordo de aeronaves civiles, como medida de seguridad aeronáutica.", "202": "El artículo 74 de la Ley de Aeronáutica Civil regula el transporte de mercancías peligrosas por vía aérea y establece las condiciones para su transporte.", "203": "La autoridad aeronáutica en Venezuela es ejercida por el presidente del INAC y sus funcionarios designados, no por el ministerio directamente.", "204": "FALSO. La Ley de Aeronáutica Civil no es una ley orgánica. Es una ley especial que regula las actividades aeronáuticas en Venezuela.", "205": "El INAC (Instituto Nacional de Aeronáutica Civil) es la única autoridad competente para suspender licencias al personal aeronáutico en Venezuela.", "206": "Las aeronaves civiles venezolanas solo pueden poseer una marca de nacionalidad y matrícula, para identificación única e inequívoca.", "207": "Los delitos a bordo de aeronaves venezolanas fuera del territorio nacional se rigen por el ordenamiento jurídico venezolano, según el principio de bandera.", "208": "El personal de tripulación de cabina es dependiente y subordinado a la autoridad aeronáutica, quien establece los requisitos y regula sus funciones.", "209": "La licencia del personal técnico aeronáutico debe renovarse 30 días antes de su vencimiento, no al vencimiento ni después.", "210": "FALSO. El INAC es un instituto autónomo, no forma parte integrante del Ministerio de Transporte. Tiene personalidad jurídica y patrimonio propio.", "211": "CIERTO. La OACI fue creada por el Convenio de Chicago de 1944, que estableció las bases para la cooperación internacional en aviación civil.", "212": "FALSO. Un convenio internacional es vinculante desde su ratificación, no requiere ser ley de la República. Venezuela aplica los convenios ratificados directamente.", "213": "Al vencer el certificado médico, el titular queda invalidado para ejercer sus atribuciones hasta obtener un nuevo certificado médico vigente.", "214": "CIERTO. La Ley de Aeronáutica Civil establece sanciones (multas, prisión, inhabilitación) para quienes cometan infracciones o delitos aeronáuticos.", "215": "La autoridad aeronáutica venezolana (presidente del INAC) es nombrada por el Ejecutivo Nacional (Presidente de la República).", "216": "La OACI fue creada para desarrollar normas y procedimientos que aseguren el desarrollo seguro y ordenado de la aviación civil internacional.", "217": "Solo el jefe del aeropuerto, en casos especiales, puede autorizar el transporte de personas bajo efectos de sustancias psicoactivas.", "218": "El grado de piloto al mando lo posee la persona titular de un certificado de competencia expedido por la autoridad aeronáutica.", "219": "El responsable por daños a personas y bienes a bordo es la persona que realiza el transporte aéreo (el operador/explotador), no solo el capitán.", "220": "Los prestadores de servicios aeronáuticos están obligados a proporcionar capacitación y adiestramiento continuo a su personal.", "221": "Solo personas de nacionalidad venezolana pueden matricular aeronaves destinadas al servicio de transporte aéreo en Venezuela.", "222": "Los explotadores no deben incumplir los períodos de servicio de vuelo establecidos para la tripulación, protegiendo así la seguridad operacional.", "223": "Alterar un detector de humo u otro dispositivo de seguridad en una aeronave acarrea una multa de 70 unidades tributarias según la ley.", "224": "Agredir, intimidar o amenazar a cualquier miembro de la tripulación conlleva una multa de 1,000 unidades tributarias.", "225": "Consumir sustancias estupefacientes o psicotrópicas como tripulante conlleva prisión de 6 a 8 años, reflejando la gravedad del delito.", "226": "Fumar, consumir drogas o portar sustancias ilegales a bordo se sanciona con multa de 1,000 unidades tributarias.", "227": "La autoridad aeronáutica de Venezuela es el INAC (Instituto Nacional de Aeronáutica Civil), no el ministerio ni el ejecutivo directamente.", "228": "Los accidentes e incidentes de aviación civil son investigados por el Ministerio de Infraestructura, como órgano competente designado.", "229": "El INAC tiene competencia para fiscalizar, expedir certificados y regular las actividades aeronáuticas (todas las anteriores son correctas).", "230": "El Documento 9481 de la OACI establece la orientación sobre respuestas de emergencia para afectaciones con mercancías peligrosas.", "231": "Los líquidos inflamables (gasolina, alcohol, solventes) se clasifican como Clase 3 de mercancías peligrosas según la clasificación de la OACI.", "232": "Los materiales radioactivos se clasifican como Clase 7 de mercancías peligrosas, requiriendo procedimientos especiales de manipulación y transporte.", "233": "Las mercancías peligrosas misceláneas (que no encajan en otras clases) se agrupan en la Clase 9, la última categoría de clasificación.", "234": "Existen tres categorías de sustancias radioactivas, clasificadas según su nivel de radiación: Categoría I (blanca), II (amarilla) y III (amarilla).", "235": "Los grupos de embalaje son tres: I (sumamente peligrosos), II (bastante peligrosos) y III (apenas peligrosos), según el nivel de riesgo.", "236": "El embalaje categoría I corresponde a productos sumamente peligrosos, que requieren el nivel más alto de protección en su embalaje.", "237": "CIERTO. Es responsabilidad del operador/explotador notificar todos los incidentes con materiales peligrosos a las autoridades competentes.", "238": "CIERTO. Las etiquetas de mercancías peligrosas deben medir 10x10 cm como estándar, para garantizar su visibilidad y reconocimiento.", "239": "CIERTO. El Documento 9481 sobre respuesta de emergencia es obligatorio en aeronaves que transporten mercancías peligrosas.", "240": "CIERTO. Todo personal involucrado en el transporte de mercancías peligrosas debe recibir instrucción específica sobre identificación, manejo y procedimientos de emergencia.", "241": "CIERTO. El explotador puede transportar mercancías peligrosas bajo excepciones específicas descritas en las Instrucciones Técnicas (Doc. 9284).", "242": "FALSO. Los pasajeros SÍ pueden transportar ciertas mercancías peligrosas en cantidades limitadas (medicinas, artículos de tocador, encendedores con válvula).", "243": "CIERTO. El explotador debe notificar al comandante y a las autoridades sobre la carga de mercancías peligrosas, incluyendo tipo, cantidad y ubicación.", "244": "CIERTO. Las etiquetas deben colocarse en lugar visible en los bultos para que sean identificables rápidamente en caso de emergencia.", "245": "CIERTO. El ATC (Control de Tráfico Aéreo) debe conocer sobre el transporte de mercancías peligrosas para coordinar la respuesta en caso de emergencia.", "246": "CIERTO. El hielo seco (CO₂ sólido) es mercancía peligrosa Clase 9 porque al sublimarse puede desplazar el oxígeno en espacios cerrados.", "247": "FALSO. Las etiquetas de mercancías peligrosas NO se pueden pintar en los embalajes. Deben ser etiquetas adhesivas estandarizadas y reemplazables.", "248": "El inglés es el idioma oficial de la aviación internacional, utilizado también para las instrucciones de transporte de mercancías peligrosas.", "249": "Si una etiqueta se cae durante el traslado, se debe notificar al explotador. No se debe volver a pegar porque podría no corresponder al contenido actual.", "250": "La cerveza no se considera mercancía peligrosa. Solo las bebidas alcohólicas de más de 24% y hasta 70% de graduación están reguladas como tales.", "251": "Dos litros de brandy en equipaje de mano no se consideran mercancía peligrosa (menos de 5 litros de bebida alcohólica entre 24-70°). Gas pimienta, extintores y baterías de litio sí son peligrosos.", "252": "FALSO. Un termómetro clínico de mercurio sin estuche protector no puede transportarse a bordo por riesgo de derrame de mercurio, que es tóxico.", "253": "El Documento 9481 proporciona orientación sobre procedimientos de emergencia para incendios y derrames de mercancías peligrosas en cabina.", "254": "El Documento 9481 contiene la información sobre efectos de derrames químicos como ácido clorhídrico y los procedimientos de respuesta.", "255": "Las variaciones del transportista son restricciones ADICIONALES que los transportistas imponen más allá de las normas oficiales, para mayor seguridad.", "256": "La dispensa se define como excepciones a la regla que se encuentran descritas en las Instrucciones Técnicas (Doc. 9284) de la OACI.", "257": "Algunas mercancías peligrosas pueden transportarse bajo condiciones específicas, con embalaje adecuado, documentación y aprobaciones correspondientes.", "258": "El Anexo 18 y el Documento 9284 de la OACI son las únicas fuentes legales auténticas para el transporte aéreo de mercancías peligrosas a nivel internacional.", "259": "La reglamentación IATA es más restrictiva que la de OACI porque IATA representa a las aerolíneas comerciales que imponen estándares más exigentes.", "260": "Un aerosol para el cabello puede transportarse como equipaje facturado en cantidades limitadas. Armas, extintores y gas de defensa no están permitidos.", "261": "Los líquidos inflamables pertenecen a la Clase 3 de mercancías peligrosas según la clasificación internacional de la OACI/IATA.", "262": "CIERTO. Si el reglamento clasifica un producto como mercancía peligrosa, no puede transportarse como equipaje de mano sin cumplir las regulaciones específicas.", "263": "Un teléfono celular con pila de litio se puede llevar como equipaje de mano. Las bebidas alcohólicas de alta graduación (>70°), hielo seco y combustible requieren restricciones.", "264": "Las mercancías peligrosas pueden constituir riesgo para la salud, la propiedad, el medio ambiente y la seguridad (todas las anteriores), de ahí su regulación estricta.", "265": "El Anexo 18 de la OACI es el que establece las normas sobre transporte seguro de mercancías peligrosas por vía aérea.", "266": "Las mercancías peligrosas se dividen en 9 clases de riesgo, desde explosivos (Clase 1) hasta misceláneos (Clase 9).", "267": "La filosofía es que toda mercancía PUEDE ser transportada por vía aérea siempre que se cumplan las condiciones de seguridad establecidas.", "268": "El hielo seco se puede transportar hasta un máximo de 2 kg como equipaje de mano, con el embalaje adecuado que permita la liberación de CO₂.", "269": "Un encendedor sin válvula de seguridad puede ser mercancía peligrosa oculta porque contiene gas inflamable y no cumple los requisitos de seguridad.", "270": "Los desechos médicos (Clase 6) corresponden a sustancias infecciosas, que contienen microorganismos patógenos que pueden causar enfermedades.", "271": "Si no se encuentra un artículo en el manual, se debe buscar mayor información antes de tomar una decisión, consultando con el explotador o autoridad competente.", "272": "La Clase 4 corresponde a sólidos inflamables, incluyendo sustancias de combustión espontánea y que emiten gases inflamables en contacto con agua.", "273": "Las sustancias corrosivas pertenecen a la Clase 8. Son materiales que pueden destruir tejidos vivos y corroer metales al contacto.", "274": "El número ONU es el código de 4 dígitos asignado internacionalmente a cada mercancía peligrosa clasificada, para su identificación universal.", "275": "VERDADERO. Los tripulantes deben saber identificar mercancías peligrosas (líquidas, sólidas o gaseosas) para aplicar los procedimientos de seguridad correspondientes.", "276": "El Anexo 18 de la OACI establece las normas y métodos recomendados (SARPS) para el transporte seguro de mercancías peligrosas por vía aérea.", "277": "El Documento 9284 de la OACI contiene las Instrucciones Técnicas detalladas para el transporte de mercancías peligrosas por vía aérea.", "278": "CIERTO. El traslado de cadáveres puede considerarse mercancía peligrosa por riesgo biológico/infeccioso y requiere tratamiento especial.", "279": "CIERTO. El hielo seco es CO₂ sólido, clasificado como mercancía peligrosa Clase 9 por su capacidad de desplazar oxígeno al sublimarse.", "280": "Las normas para transporte de mercancías peligrosas en Venezuela están en la Regulación Aeronáutica Venezolana (RAV) correspondiente.", "281": "La turbulencia se clasifica por intensidad en: ligera (leves sacudidas), moderada (cambios significativos), severa (pérdidas temporales de control) y extrema (daños estructurales).", "282": "La formación de nubes requiere: presión atmosférica adecuada, condiciones de estabilidad/inestabilidad del aire y acción solar que provoque la condensación del vapor de agua.", "283": "Presión atmosférica, estabilidad/inestabilidad del aire y acción solar son los elementos que intervienen en la formación de nubes, no de fenómenos convectivos ni dorsales.", "284": "La densidad del aire disminuye con la altura porque la presión atmosférica decrece. No es constante ni aumenta con la altura o temperatura.", "285": "La temperatura, la presión atmosférica y la humedad son los tres elementos principales que estudia la meteorología para describir el estado de la atmósfera.", "286": "La presión atmosférica es el peso del aire por unidad de superficie. No es alta ni baja presión (que son sistemas), ni vaguada.", "287": "Un frente o superficie frontal es la zona de discontinuidad donde se encuentran dos masas de aire de características diferentes (temperatura, humedad, densidad).", "288": "La turbulencia se produce por calentamiento de masas de aire (convección), procesos mecánicos (obstáculos, terreno) y causas orográficas.", "289": "La atmósfera contiene: nitrógeno 78%, oxígeno 21% y otros gases 1% (argón, CO₂, vapor de agua, etc.).", "290": "La niebla es un estrato a nivel del suelo que reduce la visibilidad a menos de 1 km. Si la visibilidad supera 1 km, se denomina bruma o neblina.", "291": "El barómetro es el instrumento para medir la presión atmosférica. El termómetro mide temperatura, el hidrómetro humedad y el termógrafo registra temperatura.", "292": "El valor estándar de presión a nivel del mar es: 29.92 pulgadas de Hg, 760 mm de Hg y 1013.25 mb, todos a 15°C (todas las anteriores son correctas).", "293": "La troposfera es donde ocurren la mayoría de fenómenos meteorológicos y donde vuelan casi todos los aviones (hasta ~36,000 pies). La estratosfera está por encima.", "294": "Un descenso marcado de la presión atmosférica indica la aproximación de mal tiempo (sistema de baja presión, frente, tormenta).", "295": "Las isobaras son líneas que unen puntos de igual presión barométrica en un mapa meteorológico. Las isotermas unen temperaturas iguales.", "296": "Cuando la temperatura ambiente se acerca al punto de rocío a nivel de superficie, el vapor de agua se condensa formando niebla.", "297": "VERDADERO. Existen dos tipos principales de barómetros: el de mercurio (tubo de Torricelli) y el aneroide (cápsula metálica flexible).", "298": "VERDADERO. El hielo sobre las alas altera el perfil aerodinámico, aumenta el peso y la resistencia, y reduce la sustentación, comprometiendo la seguridad.", "299": "La tropósfera es la capa más baja de la atmósfera donde ocurren la mayoría de los fenómenos meteorológicos y donde opera la aviación comercial.", "300": "Una superficie frontal es la zona de separación entre dos masas de aire con características físicas diferentes (temperatura, humedad, presión).", "301": "El cumulonimbus (Cb) representa peligro inminente por turbulencia severa, granizo, rayos, cortantes de viento y posibles tornados.", "302": "VERDADERO. Una nube es un volumen visible de aire que contiene vapor de agua condensada (gotitas) o subliminada (cristales de hielo) en suspensión.", "303": "El anemómetro mide la velocidad del viento. La manga indica dirección, la veleta señala de dónde viene el viento, y el barógrafo registra presión.", "304": "Cuando la temperatura aumenta con la altitud en la troposfera (inversamente a lo normal), se denomina inversión de temperatura, que inhibe la convección.", "305": "El nimboestrato es la nube gris, amorfa y extendida que produce lluvia o nevadas prolongadas y continuas, con base baja y aspecto uniforme.", "306": "VERDADERO. Las nubes son consecuencia de la condensación del vapor de agua, formando pequeñas partículas de agua líquida o hielo en suspensión atmosférica.", "307": "La turbulencia es un flujo de aire desordenado con remolinos y corrientes ascendentes/descendentes, diferente del viento racheado o la inversión térmica.", "308": "El vapor de agua es fundamental en la formación de nubes porque al condensarse forma las gotitas que componen las nubes. Sin vapor de agua no hay nubes.", "309": "El aire es una mezcla de gases (N₂, O₂ y otros). Tiene peso, puede comprimirse y no es un gas único sino una mezcla.", "310": "El nitrógeno (N₂) es el elemento más abundante en la atmósfera, constituyendo aproximadamente el 78% de su composición.", "311": "La atmósfera es una combinación de gases que cubren la Tierra, extendiéndose desde la superficie hasta el espacio exterior.", "312": "Los movimientos del aire (viento) son consecuencia de las variaciones en la presión y la temperatura atmosférica, que crean gradientes de presión.", "313": "VERDADERO. El aire tiene peso porque es materia (mezcla de gases con masa). Este peso genera la presión atmosférica.", "314": "El aire es un fluido porque puede fluir y deformarse continuamente bajo la acción de fuerzas. La aerodinámica se basa en esta propiedad.", "315": "VERDADERO. A mayor altura, la atmósfera se hace menos densa porque hay menos moléculas de aire por unidad de volumen.", "316": "FALSO. El aire caliente es MENOS denso que el aire frío. Las moléculas calientes se expanden y ocupan más espacio, reduciendo la densidad.", "317": "VERDADERO. El aire frío es más denso que el aire caliente porque las moléculas se contraen y ocupan menos espacio, aumentando la masa por unidad de volumen.", "318": "El movimiento horizontal de las masas de aire se conoce como viento. Es causado por diferencias de presión atmosférica entre zonas.", "319": "En atmósfera estándar ISA, la temperatura varía 2°C (disminuye) por cada 1,000 pies de ascenso, partiendo de 15°C a nivel del mar.", "320": "El nitrógeno es el componente más abundante de la atmósfera (78%). No contiene la capa de ozono (eso es el O₃) ni es el menos abundante.", "321": "La distancia angular entre el meridiano 0° y sí mismo siempre es 0°, pero recorriendo toda la circunferencia es 360°, ya que Greenwich es tanto 0° como 360°.", "322": "La navegación aérea es específicamente el arte de dirigir una aeronave de un punto a otro por un curso predeterminado, diferenciándose de la navegación general.", "323": "Los círculos máximos son las líneas que dividen la Tierra en dos partes iguales (hemisferios). Los meridianos y el ecuador son círculos máximos.", "324": "Las coordenadas se expresan como latitud (grados, minutos, segundos N o S) y longitud (grados, minutos, segundos E u O).", "325": "La milla náutica (1,852 m) es la unidad de medida estándar en aviación internacional, equivalente a 1 minuto de arco de latitud.", "326": "Un nudo equivale a 1 milla náutica por hora. Es la unidad estándar de velocidad en aviación y navegación marítima.", "327": "La Tierra rota 360° en 24 horas, lo que equivale a 15° de longitud por hora (360°/24h = 15°/h), base de los husos horarios.", "328": "La longitud es la distancia angular medida desde un punto hasta el meridiano de Greenwich (0°), pudiendo ser Este u Oeste.", "329": "La latitud es la distancia angular entre un punto y el ecuador, medida sobre el meridiano. Puede ser Norte o Sur, de 0° a 90°.", "330": "IFR (Instrument Flight Rules) son las reglas aplicadas cuando se vuela bajo condiciones meteorológicas instrumentales, usando instrumentos para la navegación.", "331": "La navegación a estima determina la posición basándose en la trayectoria, velocidad y tiempo transcurrido desde una posición conocida, sin observaciones externas.", "332": "Un círculo máximo se forma por la intersección de una esfera con un plano que pasa por su centro, dividiéndola en dos hemisferios iguales.", "333": "Los paralelos son círculos menores (excepto el ecuador) porque no pasan por el centro de la Tierra y no la dividen en partes iguales.", "334": "El ecuador es el círculo máximo perpendicular al eje de rotación terrestre que divide la Tierra en hemisferio norte y sur.", "335": "La latitud es la distancia angular medida sobre el meridiano tomando como referencia el ecuador. Se expresa en grados N o S.", "336": "La longitud se mide hacia el Este u Oeste desde el meridiano de Greenwich (0°) hasta 180°. La latitud se mide Norte o Sur.", "337": "El cambio de huso horario se produce cada 15° de longitud (360°/24 husos = 15° por huso), equivalente a una hora de diferencia.", "338": "El ILS (Instrument Landing System) es un sistema de aproximación que permite aterrizajes por instrumentos, proporcionando guía horizontal y vertical al piloto.", "339": "Los meridianos son círculos máximos que van de polo a polo, expresan longitud y se miden de 0° a 180° Este u Oeste desde Greenwich.", "340": "Los paralelos son círculos menores paralelos al ecuador. No son paralelos al meridiano ni son círculos máximos (excepto el ecuador).", "341": "La latitud se mide hacia Norte o Sur desde 0° (ecuador) hasta 90° (polos). No se mide en dirección Este-Oeste ni hasta 180°.", "342": "75°W = 5 husos al oeste de Greenwich (75/15=5). A las 12:00 LT se suman 5 horas: 12:00 + 5 = 17:00 UTC.", "343": "VERDADERO. El ecuador terrestre es un círculo máximo que pasa por el centro de la Tierra y la divide en los hemisferios norte y sur.", "344": "Las coordenadas geográficas (latitud y longitud) se expresan en grados, minutos y segundos de arco.", "345": "La variación magnética (declinación) es el ángulo entre el norte verdadero (geográfico) y el norte magnético, que varía según la ubicación geográfica.", "346": "El meridiano 180° es la Línea Internacional del Cambio de Fecha, donde se pasa de un día calendario al siguiente (o anterior).", "347": "FALSO. La navegación inercial (giroscopios y acelerómetros) y la navegación por satélite (GPS) son sistemas completamente diferentes en principio y tecnología.", "348": "Entre el Polo Norte (90°N) y el Polo Sur (90°S) hay 180 paralelos, correspondientes a los 180 grados de latitud (90° + 90°).", "349": "La posición geográfica queda definida por latitud (Norte o Sur) y longitud (Este u Oeste), expresadas en grados, minutos y segundos.", "350": "Un grado de latitud equivale a 60 millas náuticas (cada minuto de latitud = 1 milla náutica, y 1° = 60 minutos).", "351": "Las alas son las superficies principales donde se genera sustentación. Los controles de vuelo, empenaje, flaps y slats tienen otras funciones primarias.", "352": "Los controles hipersustentadores (flaps y slats) se ubican en los bordes de ataque y de fuga de las alas, permitiendo operar a distintas velocidades.", "353": "La navegación aérea es la técnica de planificar y efectuar un vuelo manteniéndose permanentemente ubicado con respecto al terreno y los puntos de la ruta.", "354": "Los husos horarios representan el recorrido angular de la Tierra en 24 horas dividido en 24 zonas de 15° cada una.", "355": "Navegación es conocer la posición geográfica actual, saber hacia dónde se va y cómo llegar de forma segura y eficiente.", "356": "Las coordenadas geográficas son el punto donde convergen la latitud y la longitud, definiendo una posición única sobre la superficie terrestre.", "357": "El viento puede alterar el rumbo de una aeronave al desviarla lateralmente (deriva). La turbulencia y la poca visibilidad no cambian el rumbo en sí.", "358": "Las luces de navegación (verde-derecha, roja-izquierda, blanca-cola) indican la dirección y sentido de desplazamiento de una aeronave en vuelo.", "359": "Todos los meridianos son perpendiculares a los trópicos (Cáncer y Capricornio) y al ecuador, ya que van de polo a polo cruzando todas las líneas de latitud.", "360": "Los dos movimientos del globo terráqueo son: rotación (sobre su eje, 24 horas, genera día/noche) y traslación (alrededor del sol, 365 días, genera estaciones).", "361": "La inclinación del eje terrestre (23.5°) respecto al plano orbital causa que diferentes regiones reciban distintas cantidades de luz solar, produciendo las estaciones del año.", "362": "Solo los médicos pueden dictar indicaciones específicas de atención a lesionados. Los paramédicos, socorristas y enfermeros aplican protocolos básicos.", "363": "Los primeros auxilios son medidas de carácter provisional y no quirúrgico que se aplican como atención inicial para estabilizar al accidentado hasta la llegada de ayuda médica.", "364": "La gravedad del paciente es el factor prioritario al atender sobrevivientes: determina el orden de atención (triage) y las medidas inmediatas a aplicar.", "365": "Las medidas básicas para salvar una vida incluyen: calmar el dolor, prevenir el shock y actuar sobre las causas específicas (todas las anteriores).", "366": "Los signos vitales básicos son: temperatura, pulso, frecuencia respiratoria y tensión arterial. Son los primeros indicadores del estado del accidentado.", "367": "Las primeras manifestaciones del shock son: mareos, palidez, frialdad de la piel, baja de presión y pulso rápido, indicando hipoperfusión tisular.", "368": "El shock puede presentarse por: dolor intenso, traumatismos fuertes, hemorragias, quemaduras y otras lesiones que comprometan la circulación.", "369": "El tratamiento de emergencia del shock incluye: mantener aporte sanguíneo al cerebro, evitar pérdida de calor y mantener vías aéreas permeables (todas las anteriores).", "370": "La posición Trendelenburg consiste en acostar al paciente boca arriba con las piernas elevadas sobre una superficie inclinada para mejorar el flujo sanguíneo al cerebro.", "371": "En caso de fractura, se alivia el dolor inmovilizando las articulaciones distal y proximal al sitio de fractura, evitando movimiento de los fragmentos óseos.", "372": "La hipoxia es la baja cantidad de oxígeno en la sangre, no la ausencia total (que sería anoxia) ni la falta a nivel tisular solamente.", "373": "El examen de los ojos en un lesionado sirve para comprobar si las pupilas reaccionan a la luz, lo cual indica la función neurológica y el estado de conciencia.", "374": "Para una hemorragia nasal: taponamiento con gasa húmeda, presión sobre las aletas nasales y compresas de hielo (todas las anteriores son correctas).", "375": "VERDADERO. En nariz rota, se aplica cura compresiva (gasa sobre el punto sangrante con presión) para detener el sangrado.", "376": "La frecuencia normal del pulso es de 60 a 80 pulsaciones por minuto en reposo para un adulto sano.", "377": "La temperatura normal del cuerpo humano es de 36° a 37°C. Valores superiores indican fiebre y valores inferiores indican hipotermia.", "378": "La tensión arterial normal aproximada es 70-110 mmHg, considerando que hay variaciones entre hombres y mujeres y según la edad.", "379": "En paro cardíaco, se aplica compresión torácica externa (masaje cardíaco) para mantener la circulación sanguínea hasta que llegue ayuda avanzada.", "380": "En reanimación cardiopulmonar, la relación es 5 compresiones sobre el esternón por 1 ventilación, manteniendo un ritmo constante.", "381": "El auxiliante debe mantener una frecuencia de 60 a 80 compresiones por minuto durante el masaje cardíaco, similar a la frecuencia cardíaca normal.", "382": "El método de masaje cardíaco (compresión torácica externa) es el procedimiento de emergencia utilizado en paro cardíaco para mantener la circulación.", "383": "Los síntomas de hiperventilación incluyen: vértigos, agitación, sudoración y ritmo respiratorio y cardíaco acelerados, causados por exceso de eliminación de CO₂.", "384": "La frecuencia de ventilación para un adulto en reanimación es de 12 a 16 bocanadas de aire por minuto, cada 4-5 segundos.", "385": "En reanimación respiratoria, se mantiene un ritmo de 22 veces por minuto en forma de pequeños soplidos para evitar distensión gástrica.", "386": "La reanimación respiratoria consiste en mantener oxígeno en el cuerpo mediante ventilación artificial, supliendo la función respiratoria natural.", "387": "La anoxia es la ausencia total de oxígeno en un órgano, más grave que la hipoxia (disminución parcial). Puede causar daño permanente rápidamente.", "388": "Las medidas específicas para el shock incluyen: calmar el dolor, detener hemorragias, inmovilizar fracturas y mantener la temperatura corporal.", "389": "La vía oral es la forma más simple de reponer líquidos perdidos, administrando pequeños sorbos de agua o suero oral al paciente consciente.", "390": "No se pueden suministrar líquidos por vía oral cuando hay pérdida de conocimiento, por el riesgo de broncoaspiración (entrada de líquido a los pulmones).", "391": "Los vendajes por función se clasifican en: compresivos (detienen hemorragia) e inmovilizadores (fijan fracturas). Protectores no es una función separada.", "392": "La hemorragia se define como la pérdida de sangre, que puede ser externa (visible) o interna (dentro del cuerpo).", "393": "Las hemorragias se clasifican en externas (sangre sale del cuerpo) e internas (sangre se acumula dentro), ambas requieren atención inmediata.", "394": "La presión local directa sobre la herida es el método más práctico y efectivo para contener una hemorragia externa. Simple y accesible para cualquier persona.", "395": "La hipertensión arterial se define con valores de 160 mmHg sistólica / 100 mmHg diastólica o superiores, indicando presión elevada en las arterias.", "396": "El paro cardiopulmonar es la cesación brusca e inesperada de la actividad cardíaca Y respiratoria simultáneamente, requiriendo RCP inmediata.", "397": "Ante una persona sangrando, lo primero es hacer compresión digital directa sobre la herida para detener la hemorragia, antes de cualquier otra acción.", "398": "Durante un ascenso rápido, los gases abdominales se expanden (Ley de Boyle) causando dolor abdominal intenso por aerocolgia.", "399": "La maniobra de aumento de presión abdominal (Heimlich) es la correcta para desalojar una obstrucción de las vías aéreas en un adulto consciente.", "400": "El dolor de oídos durante el ascenso se debe a la expansión de gases en el oído medio, cuando la trompa de Eustaquio no compensa la presión rápidamente.", "401": "VERDADERO. La cianosis es la coloración azulada de piel y mucosas causada por insuficiencia respiratoria (hemoglobina desoxigenada).", "402": "FALSO. La equimosis es el cambio de coloración de la piel (moretón) por rotura de capilares. La hinchazón por golpe se llama hematoma o edema.", "403": "FALSO. La herida por bala es penetrante (o perforante si tiene orificio de salida), no punzante. Las heridas punzantes son causadas por objetos delgados y afilados.", "404": "FALSO. La hipertensión es la ELEVACIÓN de la presión arterial, no la baja. La baja presión se denomina hipotensión.", "405": "FALSO. La fractura es la pérdida de continuidad (rotura) del hueso, no una descomposición arterial. Es un concepto ortopédico, no vascular.", "406": "VERDADERO. El torniquete se aplica en casos de amputación como último recurso para detener una hemorragia masiva que no responde a la presión directa.", "407": "VERDADERO. El tronco del cuerpo humano se divide anatómicamente en tórax (pecho, protegido por costillas) y abdomen (cavidad abdominal).", "408": "Las convulsiones son movimientos bruscos e incoordinados de los grupos musculares, que pueden ocurrir con o sin pérdida de conocimiento.", "409": "La asfixia es la incapacidad física o mecánica para respirar, ya sea por obstrucción de vías aéreas, compresión del tórax u otros impedimentos físicos.", "410": "A un pasajero con hipoxia se le administra oxígeno suplementario inmediatamente para restablecer los niveles adecuados de oxígeno en sangre.", "411": "Los entablillados se realizan en fracturas de huesos largos como húmero (brazo) y fémur (muslo), que requieren inmovilización bilateral de las articulaciones.", "412": "Una baja en la temperatura corporal produce hipotermia, que puede ser peligrosa y requiere calentamiento gradual del paciente.", "413": "La gravedad de una quemadura se determina por su extensión (superficie corporal afectada) y profundidad (grado), no solo por la ubicación o la edad.", "414": "Los pasos básicos de respiración artificial: despejar vía respiratoria, hiperextender el cuello, verificar respiración y aplicar ventilaciones.", "415": "El sangramiento del cuello se detiene con compresión local y apósitos. NUNCA usar torniquete en el cuello porque obstruiría las vías aéreas y vasos principales.", "416": "A una persona envenenada por gases tóxicos se le administra oxígeno y se la coloca en un área despejada con aire fresco para restaurar la respiración normal.", "417": "Una posible fractura de columna se reconoce por impotencia funcional (no puede moverse), dolor intenso y posible parálisis de extremidades.", "418": "La hemorragia venosa se caracteriza por sangre de coloración oscura (baja en oxígeno) y flujo continuo sin pulsaciones, a diferencia de la arterial (roja brillante y pulsátil).", "419": "Según las regulaciones aeronáuticas, un tripulante no debe volar dentro de las 8 horas siguientes al consumo de alcohol, incluso en cantidades pequeñas.", "420": "La mejor manera de controlar la desorientación espacial es recurrir a los instrumentos de vuelo, que proporcionan información objetiva y confiable.", "421": "Los síntomas de vértigo en vuelo se manifiestan como desorientación espacial, donde el tripulante pierde la referencia de su posición en el espacio.", "422": "La hiperventilación puede producir indigestión, sofocación y eliminación excesiva de CO₂, alterando el equilibrio ácido-base del organismo.", "423": "Dos síntomas subjetivos de hipoxia son la visión borrosa y la sensación de mareos. Son subjetivos porque el afectado puede no reconocerlos inicialmente.", "424": "Los órganos del equilibrio son la visión y el oído (sistema vestibular). Ambos proporcionan información esencial para la orientación espacial.", "425": "Un tripulante resfriado debe acudir al médico especialista, no automedicarse, ya que los medicamentos de venta libre pueden tener efectos adversos en vuelo.", "426": "La hipoxia causa insuficiente oxígeno en el cerebro, ya que este órgano es el más sensible a la falta de O₂ y el primero en mostrar síntomas.", "427": "Las hemorroides sangrantes son una de las hemorragias externas más usuales. La epistaxis (nasal) y sangramiento de oídos también son comunes pero menos frecuentes.", "428": "Ante hemorragia nasal: taponar el conducto, presionar las aletas nasales y aplicar hielo (todas las anteriores), para detener el sangrado por varios métodos.", "429": "Un sangramiento por los oídos es una grave se function getExplanation(q) {
  const id = String(q.id);
  if (EXPLANATIONS[id]) return EXPLANATIONS[id];

  const correct = q.correct;
  const correctText = q[correct] || '';
  return `La respuesta correcta es la opción ${correct}: ${correctText}.`;
}
