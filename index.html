<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen Tripulante de Cabina</title>
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --accent: #0071e3;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --border: #d2d2d7;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.header h1 {
  font-size: 2em;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.header p {
  color: var(--text2);
  font-size: 1.1em;
}

/* HOME SCREEN */
.home-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 24px 0;
}

.stat-card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
}

.stat-card .number {
  font-size: 1.8em;
  font-weight: 700;
  color: var(--accent);
}

.stat-card .label {
  font-size: 0.8em;
  color: var(--text2);
  margin-top: 4px;
}

.rounds-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin: 24px 0;
}

.round-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}

.round-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}

.round-card.completed {
  border-color: var(--green);
}

.round-card .round-number {
  font-size: 0.85em;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.round-card .round-title {
  font-size: 1.3em;
  font-weight: 700;
  margin: 6px 0;
}

.round-card .round-info {
  font-size: 0.85em;
  color: var(--text2);
}

.round-card .round-score {
  margin-top: 12px;
  font-size: 1.1em;
  font-weight: 600;
  color: var(--green);
}

.round-card .round-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  display: none;
}

.round-card.completed .round-badge { display: flex; }

.shuffle-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1.05em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 16px;
}

.shuffle-btn:hover { background: #0077ed; }

.reset-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--red);
  border: 1px solid var(--red);
  border-radius: 12px;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

/* QUIZ SCREEN */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
}

.back-btn {
  background: none;
  border: none;
  font-size: 1.1em;
  color: var(--accent);
  cursor: pointer;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}

.quiz-progress-text {
  font-size: 0.9em;
  color: var(--text2);
  font-weight: 500;
}

.quiz-score-live {
  font-size: 0.9em;
  font-weight: 600;
  color: var(--accent);
}

.progress-bar-container {
  width: 100%;
  height: 6px;
  background: #e5e5ea;
  border-radius: 3px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease;
}

.category-tag {
  display: inline-block;
  padding: 4px 12px;
  background: rgba(0,113,227,0.1);
  color: var(--accent);
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 600;
  margin-bottom: 16px;
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.question-text {
  font-size: 1.1em;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 24px;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  background: #f5f5f7;
  border: 2px solid transparent;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-size: 0.95em;
  line-height: 1.4;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(0,113,227,0.05);
}

.option-btn .option-letter {
  min-width: 28px;
  height: 28px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85em;
  flex-shrink: 0;
}

.option-btn.correct {
  border-color: var(--green);
  background: rgba(52,199,89,0.08);
}

.option-btn.correct .option-letter {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

.option-btn.wrong {
  border-color: var(--red);
  background: rgba(255,59,48,0.08);
}

.option-btn.wrong .option-letter {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

.option-btn.disabled { pointer-events: none; }
.option-btn.dimmed { opacity: 0.5; }

.feedback-card {
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  animation: slideUp 0.3s ease;
  line-height: 1.5;
}

.feedback-card.correct-fb {
  background: rgba(52,199,89,0.1);
  border-left: 4px solid var(--green);
}

.feedback-card.wrong-fb {
  background: rgba(255,59,48,0.1);
  border-left: 4px solid var(--red);
}

.feedback-card .fb-title {
  font-weight: 700;
  font-size: 1em;
  margin-bottom: 8px;
}

.feedback-card.correct-fb .fb-title { color: var(--green); }
.feedback-card.wrong-fb .fb-title { color: var(--red); }

.feedback-card .fb-text {
  font-size: 0.95em;
  color: var(--text);
}

.next-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1.05em;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  transition: background 0.2s;
}

.next-btn:hover { background: #0077ed; }

/* RESULTS SCREEN */
.results-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 40px 28px;
  box-shadow: var(--shadow);
  text-align: center;
  margin: 20px 0;
}

.results-score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  position: relative;
}

.results-score-circle .big-number {
  font-size: 2.8em;
  line-height: 1;
}

.results-score-circle .out-of {
  font-size: 0.9em;
  opacity: 0.7;
}

.results-score-circle.excellent { background: rgba(52,199,89,0.15); color: var(--green); }
.results-score-circle.good { background: rgba(0,113,227,0.1); color: var(--accent); }
.results-score-circle.average { background: rgba(255,149,0,0.1); color: var(--orange); }
.results-score-circle.poor { background: rgba(255,59,48,0.1); color: var(--red); }

.results-message {
  font-size: 1.3em;
  font-weight: 600;
  margin-bottom: 8px;
}

.results-detail {
  color: var(--text2);
  margin-bottom: 24px;
}

.results-breakdown {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 24px 0;
}

.breakdown-item {
  padding: 16px;
  border-radius: 12px;
  background: var(--bg);
}

.breakdown-item .bi-number {
  font-size: 1.5em;
  font-weight: 700;
}

.breakdown-item .bi-label {
  font-size: 0.8em;
  color: var(--text2);
}

.breakdown-item.correct-bi .bi-number { color: var(--green); }
.breakdown-item.wrong-bi .bi-number { color: var(--red); }

.review-section {
  margin-top: 24px;
  text-align: left;
}

.review-section h3 {
  font-size: 1.1em;
  margin-bottom: 12px;
  color: var(--text);
}

.review-item {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--red);
}

.review-item .ri-q {
  font-size: 0.9em;
  font-weight: 500;
  margin-bottom: 6px;
}

.review-item .ri-answer {
  font-size: 0.85em;
  color: var(--text2);
}

.review-item .ri-correct {
  font-size: 0.85em;
  color: var(--green);
  font-weight: 600;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.hidden { display: none !important; }

/* SESSION BAR */
.session-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 14px 16px;
  margin: 16px 0;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.session-info { flex: 1; min-width: 0; }
.session-label {
  font-size: 0.72em;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.session-code {
  font-size: 1.15em;
  font-weight: 700;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-top: 2px;
}
.session-actions { display: flex; gap: 8px; }
.session-btn {
  padding: 8px 14px;
  background: rgba(0,113,227,0.1);
  color: var(--accent);
  border: none;
  border-radius: 8px;
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.session-btn:hover { background: rgba(0,113,227,0.18); }
.session-btn.outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.session-btn.outline:hover { background: var(--bg); }
.sync-indicator {
  font-size: 0.72em;
  color: var(--text2);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-indicator .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}
.sync-indicator.syncing .dot { background: var(--orange); animation: pulse 1s infinite; }
.sync-indicator.error .dot { background: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* MODAL */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}
.modal h3 { font-size: 1.3em; font-weight: 700; margin-bottom: 8px; }
.modal p { color: var(--text2); font-size: 0.95em; margin-bottom: 16px; line-height: 1.45; }
.modal input {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1em;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  margin-bottom: 16px;
  background: var(--bg);
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-align: center;
}
.modal input:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; }
.modal-actions button {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
}
.modal-actions .cancel { background: transparent; border: 1px solid var(--border); color: var(--text); }
.modal-actions .confirm { background: var(--accent); color: white; }
.modal-error { color: var(--red); font-size: 0.85em; margin-top: -8px; margin-bottom: 12px; min-height: 18px; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 12px 22px;
  border-radius: 24px;
  font-size: 0.9em;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  animation: slideUp 0.3s ease;
  z-index: 200;
  max-width: 90%;
  text-align: center;
}

/* Responsive */
@media (max-width: 600px) {
  .home-stats { grid-template-columns: repeat(3, 1fr); }
  .rounds-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.6em; }
  .question-card { padding: 20px; }
  .results-breakdown { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <!-- HOME SCREEN -->
  <div id="home-screen">
    <div class="header">
      <h1>Tripulante de Cabina</h1>
      <p>Guía de estudio para licencia</p>
    </div>

    <div class="session-bar">
      <div class="session-info">
        <div class="session-label">Tu código de sesión</div>
        <div class="session-code" id="session-code">—</div>
        <div class="sync-indicator" id="sync-indicator">
          <span class="dot"></span>
          <span id="sync-text">Local</span>
        </div>
      </div>
      <div class="session-actions">
        <button class="session-btn" onclick="copyCode()">Copiar</button>
        <button class="session-btn outline" onclick="openRecoverModal()">Recuperar</button>
      </div>
    </div>

    <div class="home-stats">
      <div class="stat-card">
        <div class="number" id="total-questions">537</div>
        <div class="label">Preguntas</div>
      </div>
      <div class="stat-card">
        <div class="number" id="rounds-completed">0/6</div>
        <div class="label">Rondas</div>
      </div>
      <div class="stat-card">
        <div class="number" id="avg-score">--</div>
        <div class="label">Promedio</div>
      </div>
    </div>

    <div class="rounds-grid" id="rounds-grid"></div>

    <button class="shuffle-btn" onclick="shuffleDay()">Mezclar preguntas del día</button>
    <button class="reset-btn" onclick="resetAll()">Reiniciar todo</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="hidden">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← Rondas</button>
      <span class="quiz-progress-text" id="progress-text">1 / 100</span>
      <span class="quiz-score-live" id="score-live">0 pts</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="question-area"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="hidden"></div>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>
